name: Android CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g. 1.0.1). If empty, name is kept unchanged.'
        required: false
        default: ''
      version_code:
        description: 'Version Code (e.g. 2). If empty, code is incremented by 1.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Version Bump Script
      id: bump_version
      env:
        INPUT_VERSION_NAME: ${{ inputs.version_name }}
        INPUT_VERSION_CODE: ${{ inputs.version_code }}
      run: |
        python3 .github/scripts/bump_version.py

    - name: Commit and Push Version Changes
      if: steps.bump_version.outputs.should_commit == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add gradle.properties
        if git diff-index --quiet HEAD --; then
          echo "No version changes to commit."
        else
          git commit -m "chore(version): bump version to Name: ${{ steps.bump_version.outputs.new_version_name }}, Code: ${{ steps.bump_version.outputs.new_version_code }} [skip ci]"
          
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" =~ refs/tags/v* ]]; then
            git push origin HEAD:main
          else
            git push origin HEAD:${{ github.ref_name }}
          fi
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Decode Keystore (Release Mode)
      if: secrets.RELEASE_KEYSTORE_BASE64 != ''
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

    - name: Build APK
      env:
        # Injected from GitHub secrets at build time
        KEYSTORE_PATH: "${{ github.workspace }}/release.keystore"
        STORE_PASSWORD: "${{ secrets.RELEASE_STORE_PASSWORD }}"
        KEY_PASSWORD: "${{ secrets.RELEASE_KEY_PASSWORD }}"
        # Default API Key from Secrets or dummy if not defined
        GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY || 'AIzaSyDummyKeyForBuildOnly' }}"
      run: |
        if [ "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" != "" ]; then
          echo "Building signed Release APK..."
          ./gradlew assembleRelease
        else
          echo "No signing configuration found. Building Debug APK..."
          ./gradlew assembleDebug
        fi

    - name: Locate Build Artifacts
      id: locate_artifacts
      run: |
        if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          echo "apk_path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
          echo "apk_name=app-release.apk" >> $GITHUB_OUTPUT
        else
          echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
          echo "apk_name=app-debug.apk" >> $GITHUB_OUTPUT
        fi

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: "${{ steps.locate_artifacts.outputs.apk_name }}"
        path: "${{ steps.locate_artifacts.outputs.apk_path }}"

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: "${{ steps.locate_artifacts.outputs.apk_path }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
